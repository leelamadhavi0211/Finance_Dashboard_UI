<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Finance Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
  <h1>Finance Dashboard</h1>

  <select id="role">
    <option value="viewer">Viewer</option>
    <option value="admin">Admin</option>
  </select>
</header>

<!-- DASHBOARD -->
<section id="dashboard">
  <div class="cards">
    <div class="card" id="balance"></div>
    <div class="card" id="income"></div>
    <div class="card" id="expenses"></div>
  </div>

  <div class="charts">
  <div class="chart-box">
    <canvas id="trendChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="categoryChart"></canvas>
  </div>
  <div class="chart-box">
    <canvas id="expenseChart"></canvas>
  </div>
</div>
</section>

<!-- TRANSACTIONS -->
<section id="transactions">
  <h2>Transactions</h2>

  <div class="controls">
    <input type="text" id="search" placeholder="Search category..." />
    <select id="filter">
      <option value="all">All</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Amount</th>
        <th>Category</th>
        <th>Type</th>
      </tr>
    </thead>
    <tbody id="transactionList"></tbody>
  </table>
  <button id="addBtn">Add Transaction</button>  
  <div id="formContainer" class="hidden">
  <h3>Add Transaction</h3>

  <input type="date" id="dateInput" />
  <input type="number" id="amountInput" placeholder="Amount" />

  <input type="text" id="categoryInput" placeholder="Category" />

  <select id="typeInput">
    <option value="income">Income</option>
    <option value="expense">Expense</option>
  </select>

  <button id="saveBtn">Save</button>
</div>
  
</section>

<!-- INSIGHTS -->
<section id="insights">
  <h2>Insights</h2>
  <div id="insightContent"></div>
</section>

<script src="script.js"></script>
</body>
</html>
